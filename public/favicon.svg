<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-label="JT favicon">
  <style>
    :root {
      --fg: #000000;
      --text: #FFFFFF;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --fg: #FFFFFF;
        --text: #000000;
      }
    }
  </style>
  <rect width="100" height="100" rx="12" ry="12" fill="var(--fg)"/>
  <text
    x="50"
    y="54"
    text-anchor="middle"
    dominant-baseline="middle"
    fill="var(--text)"
    font-family="'Monaspace Neon', 'JetBrains Mono', 'SFMono-Regular', 'Cascadia Mono', 'Roboto Mono', 'DejaVu Sans Mono', monospace"
    font-size="48"
    font-weight="800"
    letter-spacing="-3">JT</text>
</svg>
